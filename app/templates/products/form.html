{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h1 class="h3 mb-1">{{ page_title }}</h1>
    <p class="text-muted mb-0">Create reusable service and product prices.</p>
</div>

<form class="card shadow-sm border-0" method="post" action="{{ form_action }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" name="name" required value="{{ product.name if product else '' }}">
            </div>
            <div class="col-12">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-control" id="description" name="description" rows="2">{{ product.description if product and product.description else '' }}</textarea>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="unit_price">Unit price</label>
                <input class="form-control" id="unit_price" name="unit_price" type="number" step="0.01" value="{{ product.unit_price if product else '0' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="vat_percent">VAT percent</label>
                <input class="form-control" id="vat_percent" name="vat_percent" type="number" step="0.01" value="{{ product.vat_percent if product else default_vat_percent }}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="unit">Unit</label>
                <input class="form-control" id="unit" name="unit" value="{{ product.unit if product else 'pcs' }}">
            </div>
            {% if product %}
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" id="is_active" name="is_active" type="checkbox" {% if product.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Active</label>
                </div>
            </div>
            {% endif %}
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" id="is_stock_item" name="is_stock_item" type="checkbox" {% if product and product.is_stock_item %}checked{% endif %}>
                    <label class="form-check-label" for="is_stock_item">Stock item</label>
                </div>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white d-flex gap-2 justify-content-end">
        <a class="btn btn-outline-secondary" href="/products">Cancel</a>
        <button class="btn btn-primary" type="submit">Save product</button>
    </div>
</form>
{% endblock %}
