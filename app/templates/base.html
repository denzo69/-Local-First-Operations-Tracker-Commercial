<!doctype html>
<html lang="{{ language }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/">{{ app_name }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">{{ t.dashboard }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'customers' %}active{% endif %}" href="/customers">{{ t.customers }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'jobs' %}active{% endif %}" href="/work-orders">{{ t.work_orders }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'products' %}active{% endif %}" href="/products">{{ t.products }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'reports' %}active{% endif %}" href="/reports">{{ t.reports }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'backups' %}active{% endif %}" href="/backups">{{ t.backups }}</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'audit_log' %}active{% endif %}" href="/audit-log">Audit log</a></li>
                <li class="nav-item"><a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/settings">{{ t.settings }}</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
