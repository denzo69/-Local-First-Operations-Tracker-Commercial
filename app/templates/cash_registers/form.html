{% extends "base.html" %}
{% block content %}
<h1>{{ "Edit cash register" if register else "New cash register" }}</h1>
<form method="post" action="{{ form_action }}" class="card p-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" id="name" name="name" value="{{ register.name if register else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="location">Location</label>
        <input class="form-control" id="location" name="location" value="{{ register.location if register and register.location else '' }}">
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if not register or register.is_active %}checked{% endif %}>
        <label class="form-check-label" for="is_active">Active</label>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="/cash-registers">Cancel</a>
    </div>
</form>
{% endblock %}
