{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h1 class="h3 mb-1">{{ t.language }}</h1>
    <p class="text-muted mb-0">{{ t.language_help }}</p>
</div>

<form class="card shadow-sm border-0" method="post" action="/settings/language">
    <div class="card-body">
        <label class="form-label" for="language">{{ t.language }}</label>
        <select class="form-select" id="language" name="language">
            {% for code, label in supported_languages.items() %}
            <option value="{{ code }}" {% if settings_values.language == code %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
        <input type="hidden" name="next_url" value="/">
    </div>
    <div class="card-footer bg-white d-flex justify-content-end">
        <button class="btn btn-primary" type="submit">{{ t.save_language }}</button>
    </div>
</form>
{% endblock %}
