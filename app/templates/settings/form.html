{% extends "base.html" %}

{% block content %}
<div class="mb-4">
        <h1 class="h3 mb-1">{{ t.settings }}</h1>
        <p class="text-muted mb-0">{{ t.settings_subtitle }}</p>
</div>

<div class="mb-3">
    <a class="btn btn-outline-secondary" href="/settings/statuses">Workflow statuses</a>
</div>

<form class="card shadow-sm border-0" method="post" action="/settings">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label" for="company_name">{{ t.company_name }}</label>
                <input class="form-control" id="company_name" name="company_name" value="{{ settings_values.company_name }}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="company_business_id">{{ t.business_id }}</label>
                <input class="form-control" id="company_business_id" name="company_business_id" value="{{ settings_values.company_business_id }}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="default_vat_percent">{{ t.default_vat_percent }}</label>
                <input class="form-control" id="default_vat_percent" name="default_vat_percent" type="number" step="0.01" value="{{ settings_values.default_vat_percent }}">
            </div>
            <div class="col-12">
                <label class="form-label" for="company_address">{{ t.address }}</label>
                <textarea class="form-control" id="company_address" name="company_address" rows="2">{{ settings_values.company_address }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="company_phone">{{ t.phone }}</label>
                <input class="form-control" id="company_phone" name="company_phone" value="{{ settings_values.company_phone }}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="company_email">{{ t.email }}</label>
                <input class="form-control" id="company_email" name="company_email" value="{{ settings_values.company_email }}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="receipt_prefix">{{ t.receipt_prefix }}</label>
                <input class="form-control" id="receipt_prefix" name="receipt_prefix" value="{{ settings_values.receipt_prefix }}">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="language">{{ t.language }}</label>
                <select class="form-select" id="language" name="language">
                    {% for code, label in supported_languages.items() %}
                    <option value="{{ code }}" {% if settings_values.language == code %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end">
        <button class="btn btn-primary" type="submit">{{ t.save_settings }}</button>
    </div>
</form>
{% endblock %}
