{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h1 class="h3 mb-1">{{ "Edit status" if status else "New status" }}</h1>
    <p class="text-muted mb-0">Ready states appear in ready lists. Final states move work orders to history.</p>
</div>

<form class="card shadow-sm border-0" method="post" action="{{ form_action }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" name="name" required value="{{ status.name if status else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="sort_order">Sort order</label>
                <input class="form-control" id="sort_order" name="sort_order" type="number" value="{{ status.sort_order if status else 0 }}">
            </div>
            <div class="col-12 d-flex flex-wrap gap-3">
                <label class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_ready_state" value="true" {% if status and status.is_ready_state %}checked{% endif %}>
                    <span class="form-check-label">Ready state</span>
                </label>
                <label class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_packed_state" value="true" {% if status and status.is_packed_state %}checked{% endif %}>
                    <span class="form-check-label">Packed state</span>
                </label>
                <label class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_final" value="true" {% if status and status.is_final %}checked{% endif %}>
                    <span class="form-check-label">Final state</span>
                </label>
                <label class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" value="true" {% if not status or status.is_active %}checked{% endif %}>
                    <span class="form-check-label">Active</span>
                </label>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="/settings/statuses">Cancel</a>
        <button class="btn btn-primary" type="submit">Save status</button>
    </div>
</form>
{% endblock %}
