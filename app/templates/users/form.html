{% extends "base.html" %}
{% block content %}
<h1>{{ "Edit user" if user else "New user" }}</h1>
<form method="post" action="{{ form_action }}" class="card p-3">
    <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" id="name" name="name" value="{{ user.name if user else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="login_name">Login name</label>
        <input class="form-control" id="login_name" name="login_name" value="{{ user.login_name if user and user.login_name else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label" for="role_id">Role</label>
        <select class="form-select" id="role_id" name="role_id" required>
            {% for role in roles %}
            <option value="{{ role.id }}" {% if user and user.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if not user or user.is_active %}checked{% endif %}>
        <label class="form-check-label" for="is_active">Active</label>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="/users">Cancel</a>
    </div>
</form>
{% endblock %}
