name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      PASSWORD_ITERATIONS: "1000"
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q --durations=20 --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html --junitxml=test-results.xml

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            test-results.xml
            coverage.xml
            htmlcov
          if-no-files-found: warn
